name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: tlsrep
          POSTGRES_PASSWORD: tlsrep
          POSTGRES_DB: tlsrep
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U tlsrep"
          --health-interval 5s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --frozen
      - name: Lint
        run: uv run ruff check .
      - name: Test
        env:
          TLSREP_DSN: postgresql://tlsrep:tlsrep@localhost:5432/tlsrep
        run: uv run pytest -q

  image:
    needs: check
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          # This repo owns its own package, so GITHUB_TOKEN can create + push it.
          # (The old monorepo package tls-reputation-backend is linked to the
          # monorepo and would 403 a push from here without an explicit grant.)
          # The monorepo's deploy points at this image at cutover.
          images: ghcr.io/vitalii-zaiats/tls-reputation-api
          tags: |
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
